; ---------------------------------------------------------------------
[env:native]
platform = native
framework =
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Iinclude
    -Isrc
    -DNATIVE_BUILD
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-9
