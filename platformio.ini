; reticulum-rnode
; ----------------
; RNode firmware with KISS interface for nRF52840 + SX1262 boards.
; Serial-to-LoRa bridge — the host runs Reticulum, the RNode handles radio.

[platformio]
default_envs = Faketec

[env]
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

; ---------------------------------------------------------------------
; Faketec — Nice!Nano-style nRF52840 ProMicro clone + Ebyte E22-900M30S
; ---------------------------------------------------------------------
[env:Faketec]
platform = nordicnrf52
board = nrf52840_dk_adafruit
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
upload_protocol = nrfutil
extra_scripts = pre:scripts/pre_build.py
build_unflags =
    ${env.build_unflags}
    -fno-exceptions
    -fno-rtti
    --specs=nano.specs
build_flags =
    ${env.build_flags}
    -fexceptions
    -frtti
    --specs=nosys.specs
    -DBOARD_MODEL=BOARD_Faketec
    -include include/board/Faketec.h
    -DUSTORE_USE_INTERNALFS
lib_deps =
    ${env.lib_deps}
    jgromes/RadioLib @ ^7.3.0

; native — host-side unit tests
; ---------------------------------------------------------------------
[env:native]
platform = native
framework =
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Iinclude
    -Isrc
    -DNATIVE_BUILD
